
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Никита</title>
    <style>
        /* Основной фон и выравнивание */
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        /* Заголовок */
        h1 {
            color: #333;
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Абзац */
        p {
            color: #555;
            font-size: 20px;
            margin-bottom: 40px;
        }

        /* Кнопки */
        .btn {
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 18px;
        }

        .btn:hover {

        }
    </style>
</head>
